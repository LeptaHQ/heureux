name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: heureux
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d heureux"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/heureux
      SECRET_KEY: ci-only-secret-key-0123456789abcdef0123456789abcdef
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      CSRF_TRUSTED_ORIGINS: http://localhost
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py check --deploy
      - run: python manage.py migrate --noinput
      - run: python manage.py import_content
      - run: python manage.py import_content
      - run: python manage.py import_content --if-changed
      - run: python manage.py test --parallel
      - run: python manage.py collectstatic --noinput
      - run: pip-audit -r requirements.txt

  browser:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: heureux_browser
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d heureux_browser"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/heureux_browser
      SECRET_KEY: ci-only-secret-key-0123456789abcdef0123456789abcdef
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python -m playwright install --with-deps chromium
      - run: python manage.py test study.tests.browser_tests
