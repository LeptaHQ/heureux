{% load static %}
<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Heureux{% endblock %}</title>
  <meta name="theme-color" content="#173f90">
  <script src="{% static 'study/js/theme-init.js' %}?v=2"></script>
  <link rel="stylesheet" href="{% static 'study/css/app.css' %}?v=117">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="{% static 'study/icons/logo.svg' %}?v=2">
</head>
<body class="auth-shell">
  <main class="auth-page">
    <header class="auth-brand">
      <img src="{% static 'study/icons/logo.svg' %}?v=2" alt="">
      <div>
        <strong>Heureux</strong>
        <span>Expression française</span>
      </div>
    </header>
    {% block content %}{% endblock %}
  </main>
  <script src="{% static 'study/js/auth.js' %}?v=1"></script>
</body>
</html>
